<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 460" role="img" aria-labelledby="title desc" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title id="title">Codex App Mirror verified distribution pipeline</title>
  <desc id="desc">Official Microsoft and OpenAI sources flow through Codex identity and integrity verification into stable GitHub Release and global download endpoints.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07091a"/>
      <stop offset="0.48" stop-color="#10153a"/>
      <stop offset="1" stop-color="#171047"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#818cf8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="softLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#c7d2fe" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.52"/>
    </filter>
    <filter id="coreShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.3  0 1 0 0 0.35  0 0 1 0 1  0 0 0 0.7 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="canvasClip">
      <rect width="1400" height="460" rx="26"/>
    </clipPath>
    <path id="leftFlow" d="M370 253 C438 253 470 230 536 230"/>
    <path id="rightFlow" d="M864 230 C930 230 962 253 1030 253"/>
  </defs>

  <style>
    .eyebrow { fill: #a5b4fc; font-size: 10px; font-weight: 750; letter-spacing: 0.2em; }
    .title { fill: #f8fafc; font-size: 31px; font-weight: 720; letter-spacing: -0.025em; }
    .subtitle { fill: #cbd5e1; font-size: 13.5px; font-weight: 450; }
    .stage { fill: #94a3b8; font-size: 9.5px; font-weight: 760; letter-spacing: 0.18em; }
    .card-title { fill: #f8fafc; font-size: 15px; font-weight: 650; }
    .card-sub { fill: #94a3b8; font-size: 10.5px; font-weight: 450; }
    .core-kicker { fill: #c7d2fe; font-size: 9px; font-weight: 760; letter-spacing: 0.18em; }
    .core-title { fill: #ffffff; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .core-id { fill: #cbd5e1; font-size: 9.5px; font-weight: 500; }
    .pill { fill: #dbeafe; font-size: 10px; font-weight: 650; }
    .metric-value { fill: #f8fafc; font-size: 12px; font-weight: 700; }
    .metric-label { fill: #94a3b8; font-size: 9.5px; font-weight: 500; }
    .glass { fill: #ffffff; fill-opacity: 0.055; stroke: url(#glassStroke); stroke-width: 1; }
    .flow { fill: none; stroke: url(#pipeline); stroke-width: 2.2; stroke-linecap: round; stroke-dasharray: 4 8; animation: dash 2.8s linear infinite; }
    .flow-back { fill: none; stroke: url(#pipeline); stroke-width: 10; stroke-linecap: round; opacity: 0.08; }
    .orbit { fill: none; stroke: #a5b4fc; stroke-opacity: 0.26; stroke-width: 1; stroke-dasharray: 3 7; animation: spin 18s linear infinite; transform-origin: 700px 230px; }
    .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: center; }
    @keyframes dash { to { stroke-dashoffset: -96; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .flow, .orbit, .pulse { animation: none; } }
  </style>

  <g clip-path="url(#canvasClip)">
    <rect width="1400" height="460" fill="url(#background)"/>
    <rect width="1400" height="460" fill="url(#grid)"/>
    <ellipse cx="80" cy="92" rx="420" ry="310" fill="url(#glowLeft)"/>
    <ellipse cx="700" cy="235" rx="390" ry="300" fill="url(#glowCenter)"/>
    <ellipse cx="1320" cy="72" rx="410" ry="300" fill="url(#glowRight)"/>
    <path d="M-80 356 C260 270 438 440 720 344 S1170 284 1500 368" fill="none" stroke="url(#softLine)" stroke-opacity="0.14" stroke-width="70"/>

    <g transform="translate(64 44)">
      <text class="eyebrow" x="0" y="0">VERIFIED DISTRIBUTION</text>
      <text class="title" x="0" y="38">Codex App Mirror</text>
      <text class="subtitle" x="0" y="65">Codex product lineage · now distributed as ChatGPT Desktop</text>
    </g>

    <g transform="translate(1080 44)">
      <rect class="glass" width="116" height="30" rx="15"/>
      <circle cx="17" cy="15" r="4" fill="#34d399" filter="url(#dotGlow)"/>
      <text class="pill" x="29" y="19">15-MIN PROBE</text>
      <rect class="glass" x="126" width="128" height="30" rx="15"/>
      <path d="M145 10.5l6-3 6 3v5.2c0 4.1-2.4 6.7-6 8.1-3.6-1.4-6-4-6-8.1z" fill="none" stroke="#a5b4fc" stroke-width="1.4"/>
      <path d="M148 15.2l2.1 2.1 4-4.1" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="pill" x="166" y="19">IDENTITY GATED</text>
    </g>

    <g filter="url(#shadow)">
      <text class="stage" x="82" y="144">OFFICIAL SOURCES</text>
      <rect class="glass" x="70" y="158" width="300" height="190" rx="22"/>

      <g transform="translate(92 181)">
        <rect fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09" width="256" height="66" rx="14"/>
        <g transform="translate(17 17)">
          <rect width="14" height="14" rx="1.5" fill="#f25022"/>
          <rect x="17" width="14" height="14" rx="1.5" fill="#7fba00"/>
          <rect y="17" width="14" height="14" rx="1.5" fill="#00a4ef"/>
          <rect x="17" y="17" width="14" height="14" rx="1.5" fill="#ffb900"/>
        </g>
        <text class="card-title" x="65" y="28">Microsoft Store</text>
        <text class="card-sub" x="65" y="45">Windows · OpenAI.Codex</text>
      </g>

      <g transform="translate(92 259)">
        <rect fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09" width="256" height="66" rx="14"/>
        <g transform="translate(17 16)" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="16" cy="16" r="14.5" stroke="#f8fafc" stroke-opacity="0.86"/>
          <path d="M16 5v22M5 16h22M8.2 8.2l15.6 15.6M23.8 8.2L8.2 23.8" stroke="#a5b4fc" stroke-width="1.2"/>
          <circle cx="16" cy="16" r="5.2" fill="#818cf8" stroke="none"/>
        </g>
        <text class="card-title" x="65" y="28">OpenAI Appcast</text>
        <text class="card-sub" x="65" y="45">macOS · com.openai.codex</text>
      </g>
    </g>

    <path class="flow-back" d="M370 253 C438 253 470 230 536 230"/>
    <path class="flow" d="M370 253 C438 253 470 230 536 230"/>
    <circle r="4" fill="#67e8f9" filter="url(#dotGlow)">
      <animateMotion dur="3.1s" repeatCount="indefinite"><mpath href="#leftFlow"/></animateMotion>
    </circle>

    <g>
      <circle class="orbit" cx="700" cy="230" r="126"/>
      <circle cx="700" cy="230" r="105" fill="#818cf8" fill-opacity="0.035" stroke="#a5b4fc" stroke-opacity="0.13"/>
      <circle class="pulse" cx="700" cy="230" r="87" fill="url(#glowCenter)"/>
      <circle cx="700" cy="230" r="68" fill="url(#coreFill)" filter="url(#coreShadow)"/>
      <circle cx="700" cy="230" r="66" fill="#0f153d" fill-opacity="0.54" stroke="#ffffff" stroke-opacity="0.26"/>

      <g transform="translate(666 187)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 30c-8.5 0-15-5.8-15-13.2C2 9.4 8 4 15.3 4c2.1 0 4.2.5 6 1.5C25 1.8 29.1 0 34 0c9.1 0 16.6 6.8 17.5 15.5C59 16.3 64 21.4 64 28c0 7.2-6.2 13-14 13H17z" fill="#ffffff" fill-opacity="0.13" stroke-opacity="0.82" stroke-width="1.6"/>
        <path d="M19 22l8 7-8 7M34 36h12" stroke-width="3.4"/>
      </g>
      <text class="core-kicker" x="700" y="281" text-anchor="middle">MIRROR CORE</text>
      <text class="core-title" x="700" y="304" text-anchor="middle">Verify · Preserve · Publish</text>
      <text class="core-id" x="700" y="322" text-anchor="middle">com.openai.codex  ·  OpenAI.Codex</text>

      <g fill="#0f172a" stroke="#a5b4fc" stroke-opacity="0.52">
        <circle cx="700" cy="104" r="8"/>
        <circle cx="826" cy="230" r="8"/>
        <circle cx="700" cy="356" r="8"/>
        <circle cx="574" cy="230" r="8"/>
      </g>
      <g fill="#67e8f9">
        <circle cx="700" cy="104" r="3"/>
        <circle cx="826" cy="230" r="3"/>
        <circle cx="700" cy="356" r="3"/>
        <circle cx="574" cy="230" r="3"/>
      </g>
    </g>

    <path class="flow-back" d="M864 230 C930 230 962 253 1030 253"/>
    <path class="flow" d="M864 230 C930 230 962 253 1030 253"/>
    <circle r="4" fill="#c084fc" filter="url(#dotGlow)">
      <animateMotion dur="3.1s" repeatCount="indefinite" begin="-1.2s"><mpath href="#rightFlow"/></animateMotion>
    </circle>

    <g filter="url(#shadow)">
      <text class="stage" x="1042" y="144">STABLE DELIVERY</text>
      <rect class="glass" x="1030" y="158" width="300" height="190" rx="22"/>

      <g transform="translate(1052 181)">
        <rect fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09" width="256" height="66" rx="14"/>
        <g transform="translate(17 17) scale(1.34)" fill="#f8fafc">
          <path d="M12 0C5.37 0 0 5.38 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58 0-.29-.01-1.23-.02-2.23-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.33-1.76-1.33-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0112 5.8c1.02 0 2.05.14 3.01.4 2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.62-5.48 5.92.43.37.81 1.1.81 2.22 0 1.6-.01 2.89-.01 3.29 0 .32.22.7.82.58A12 12 0 0012 0z"/>
        </g>
        <text class="card-title" x="65" y="28">GitHub Releases</text>
        <text class="card-sub" x="65" y="45">Versioned assets · checksums</text>
      </g>

      <g transform="translate(1052 259)">
        <rect fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09" width="256" height="66" rx="14"/>
        <g transform="translate(17 16)" fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="16" cy="16" r="14"/>
          <path d="M2 16h28M16 2c4.7 4.5 7 9.2 7 14s-2.3 9.5-7 14c-4.7-4.5-7-9.2-7-14s2.3-9.5 7-14z"/>
          <path d="M24 25l7 0m-3-3l3 3-3 3" stroke="#67e8f9" stroke-width="2"/>
        </g>
        <text class="card-title" x="65" y="28">Stable Download Links</text>
        <text class="card-sub" x="65" y="45">Windows · macOS · global routing</text>
      </g>
    </g>

    <g transform="translate(70 388)">
      <rect class="glass" width="1260" height="48" rx="16"/>
      <g transform="translate(28 0)">
        <circle cx="7" cy="24" r="4" fill="#34d399"/>
        <text class="metric-value" x="20" y="21">Every 15 minutes</text>
        <text class="metric-label" x="20" y="35">upstream probe cadence</text>
      </g>
      <line x1="310" y1="12" x2="310" y2="36" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(345 0)">
        <path d="M4 17l7-3.5 7 3.5v5.8c0 4.6-2.8 7.5-7 9-4.2-1.5-7-4.4-7-9z" fill="none" stroke="#67e8f9" stroke-width="1.3"/>
        <text class="metric-value" x="30" y="21">Identity verified</text>
        <text class="metric-label" x="30" y="35">Codex lineage only</text>
      </g>
      <line x1="630" y1="12" x2="630" y2="36" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(665 0)">
        <path d="M3 17h17v14H3zM7 17v-3h9v3" fill="none" stroke="#a5b4fc" stroke-width="1.3"/>
        <text class="metric-value" x="31" y="21">Byte-for-byte</text>
        <text class="metric-label" x="31" y="35">SHA-256 manifest</text>
      </g>
      <line x1="940" y1="12" x2="940" y2="36" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(975 0)">
        <path d="M3 25h6l3-8 4 14 3-6h8" fill="none" stroke="#c084fc" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <text class="metric-value" x="38" y="21">Sparkle deltas</text>
        <text class="metric-label" x="38" y="35">original EdDSA signatures</text>
      </g>
    </g>
  </g>
</svg>
