name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Validate shell scripts
        shell: bash
        run: bash -n scripts/*.sh

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/download-windows.ps1", [ref] $tokens, [ref] $errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Validate GitHub Actions
        shell: bash
        run: actionlint

      - name: Test release metadata fixture
        shell: bash
        run: scripts/test-prepare-release-metadata.sh

      - name: Test release probe fixture
        shell: bash
        run: scripts/test-probe-release.sh

      - name: Test release probe preserved ARM64 fixture
        shell: bash
        run: scripts/test-probe-release-preserved-arm64.sh

      - name: Test release probe Windows-rollout fixture
        shell: bash
        run: scripts/test-probe-release-windows-rollout.sh

      - name: Test release probe stale-FE3 fixture
        shell: bash
        run: scripts/test-probe-release-stale-fe3.sh

      - name: Test Windows download retry fixture
        shell: bash
        run: scripts/test-download-windows-retry.sh

      - name: Test secondary S3 retry fixture
        shell: bash
        run: scripts/test-sync-secondary-s3.sh

      - name: Test download stats fixture
        shell: bash
        run: python3 scripts/test-update-download-stats.py

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare/download-router/package-lock.json

      - name: Test download router worker
        shell: bash
        run: |
          npm ci --prefix cloudflare/download-router
          npm run check --prefix cloudflare/download-router

      - name: Test appcast generation fixture
        shell: bash
        run: scripts/test-build-appcast.sh

      - name: Test macOS Sparkle prune fixture
        shell: bash
        run: scripts/test-prune-mac-source.sh

      - name: Test Windows portable fixture
        shell: bash
        run: scripts/test-prepare-windows-portable.sh

      - name: Build Microsoft Store resolver
        run: dotnet build scripts/store-link/StoreLink.csproj --configuration Release
