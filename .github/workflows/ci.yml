name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout agents-mirror-kit
        uses: actions/checkout@v6
        with:
          repository: Wangnov/agents-mirror-kit
          ref: v0.2.0
          path: .mirror-kit

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Validate shell scripts
        shell: bash
        run: bash -n scripts/*.sh

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/download-windows.ps1", [ref] $tokens, [ref] $errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Validate GitHub Actions
        shell: bash
        run: actionlint

      - name: Test backend version reader fixture
        shell: bash
        run: scripts/test-read-codex-backend-version.sh

      - name: Test release metadata fixture
        shell: bash
        run: scripts/test-prepare-release-metadata.sh

      - name: Test current-local artifact marker semantics
        shell: bash
        run: scripts/test-read-current-local-artifact.sh

      - name: Test release probe fixture
        shell: bash
        run: scripts/test-probe-release.sh

      - name: Test macOS Beta probe fixture
        shell: bash
        run: scripts/test-probe-macos-beta.sh

      - name: Test Beta prerelease-only policy
        shell: bash
        run: scripts/test-beta-prerelease-policy.sh

      - name: Test Beta GitHub prerelease publisher fixture
        shell: bash
        run: scripts/test-beta-publish-release.sh

      - name: Test release probe preserved ARM64 fixture
        shell: bash
        run: scripts/test-probe-release-preserved-arm64.sh

      - name: Test release probe Windows-rollout fixture
        shell: bash
        run: scripts/test-probe-release-windows-rollout.sh

      - name: Test release probe stale-FE3 fixture
        shell: bash
        run: scripts/test-probe-release-stale-fe3.sh

      - name: Test Windows download retry fixture
        shell: bash
        run: scripts/test-download-windows-retry.sh

      - name: Test Beta prerelease identity and finalization fixture
        shell: bash
        run: scripts/test-emergency-verify-windows.sh

      - name: Test secondary S3 retry fixture
        shell: bash
        run: scripts/test-sync-secondary-s3.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate download router config against kit worker
        shell: bash
        run: node cloudflare/download-router/validate-config.mjs

      - name: Validate secondary-sync worker
        shell: bash
        run: |
          npm ci --prefix cloudflare/secondary-sync
          npm run check --prefix cloudflare/secondary-sync

      - name: Test appcast generation fixture
        shell: bash
        run: scripts/test-build-appcast.sh

      - name: Test macOS double-basename downloads
        shell: bash
        run: scripts/test-download-macos.sh

      - name: Test macOS Sparkle prune fixture
        shell: bash
        run: scripts/test-prune-mac-source.sh

      - name: Test Windows portable fixture
        shell: bash
        run: scripts/test-prepare-windows-portable.sh

      - name: Build Microsoft Store resolver
        run: dotnet build scripts/store-link/StoreLink.csproj --configuration Release

  macos-identity:
    name: Validate macOS package identity gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test DMG and Sparkle archive identity fixtures
        shell: bash
        run: scripts/test-read-macos-metadata.sh
