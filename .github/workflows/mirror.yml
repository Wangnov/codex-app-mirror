name: Mirror Codex App Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag. Defaults to a version-derived tag.
        required: false
        type: string
      force_release:
        description: Publish even when the latest release already matches current sources.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "11 */6 * * *"

permissions:
  contents: read

env:
  R2_BUCKET_NAME: codex-app-mirror
  R2_PUBLIC_BASE_URL: https://codexapp.agentsmirror.com

concurrency:
  group: codex-app-mirror
  cancel-in-progress: false

jobs:
  probe:
    name: Probe current versions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.probe.outputs.should_release }}
      release_tag: ${{ steps.probe.outputs.release_tag }}
      latest_tag: ${{ steps.probe.outputs.latest_tag }}
      skip_reason: ${{ steps.probe.outputs.skip_reason }}
      version_summary: ${{ steps.probe.outputs.version_summary }}
      manifest: ${{ steps.probe.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Probe sources
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FORCE_RELEASE: ${{ inputs.force_release || 'false' }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: bash scripts/probe-release.sh

  macos:
    name: Download macOS installers
    runs-on: macos-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download macOS DMGs
        shell: bash
        run: |
          set -euo pipefail
          cat > probe-manifest.json <<'JSON'
          ${{ needs.probe.outputs.manifest }}
          JSON

          bash scripts/download-macos.sh dist/macos probe-manifest.json

      - name: Read macOS app metadata
        run: bash scripts/read-macos-metadata.sh dist/macos/macos-metadata.json dist/macos/Codex-mac-arm64.dmg dist/macos/Codex-mac-x64.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codex-macos
          path: dist/macos/*
          if-no-files-found: error

  windows:
    name: Download Windows installer
    runs-on: windows-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows MSIX
        shell: pwsh
        run: |
          @'
          ${{ needs.probe.outputs.manifest }}
          '@ | Set-Content -Encoding utf8 -Path probe-manifest.json

          ./scripts/download-windows.ps1 -OutDir dist/windows -ManifestPath probe-manifest.json

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-windows
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    if: needs.probe.outputs.should_release == 'true'
    permissions:
      contents: write
    needs:
      - probe
      - macos
      - windows
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          cat > probe-manifest.json <<'JSON'
          ${{ needs.probe.outputs.manifest }}
          JSON

          bash scripts/prepare-release-metadata.sh \
            probe-manifest.json \
            artifacts/codex-macos/macos-metadata.json \
            artifacts \
            "$R2_PUBLIC_BASE_URL" \
            "${{ needs.probe.outputs.release_tag }}"

      - name: Build macOS Sparkle appcasts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build-appcast.sh arm64 release-manifest.json "$R2_PUBLIC_BASE_URL" appcast.xml
          bash scripts/build-appcast.sh x64 release-manifest.json "$R2_PUBLIC_BASE_URL" appcast-x64.xml

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          # The Sparkle .zip archives are checksummed in SHA256SUMS.txt, so attach
          # them to the Release too (keeps every listed checksum downloadable and
          # gives the archives a canonical immutable home alongside the mirror).
          arm_short_version="$(jq -r '.sources.macos.arm64.appcast.shortVersionString' release-manifest.json)"
          x64_short_version="$(jq -r '.sources.macos.x64.appcast.shortVersionString' release-manifest.json)"
          mac_arm64_zip="artifacts/codex-macos/Codex-darwin-arm64-${arm_short_version}.zip"
          mac_intel_zip="artifacts/codex-macos/Codex-darwin-x64-${x64_short_version}.zip"
          test -f "$mac_arm64_zip"
          test -f "$mac_intel_zip"

          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            artifacts/codex-macos/Codex-mac-arm64.dmg \
            artifacts/codex-macos/Codex-mac-x64.dmg \
            "$mac_arm64_zip" \
            "$mac_intel_zip" \
            artifacts/codex-macos/SHA256SUMS-macos.txt \
            artifacts/codex-windows/* \
            assets/status.png \
            release-manifest.json \
            SHA256SUMS.txt

      - name: Remove latest links from previous release notes
        if: needs.probe.outputs.latest_tag != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: bash scripts/remove-latest-links-from-release-notes.sh "${{ needs.probe.outputs.latest_tag }}"

      - name: Ensure AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Sync GitHub Release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_S3_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        shell: bash
        run: |
          set -euo pipefail
          mac_arm64="artifacts/codex-macos/Codex-mac-arm64.dmg"
          mac_intel="artifacts/codex-macos/Codex-mac-x64.dmg"
          win_msix="$(find artifacts/codex-windows -maxdepth 1 -type f \( -name '*.Msix' -o -name '*.msix' \) | sort | head -n 1)"

          test -f "$mac_arm64"
          test -f "$mac_intel"
          test -f "$win_msix"

          # Sparkle update archives the generated appcasts point at. Their object
          # keys (latest/mac/{arm64,intel}/...) must match the enclosure URLs that
          # build-appcast.sh emits, or the client's downloads would 404.
          arm_short_version="$(jq -r '.sources.macos.arm64.appcast.shortVersionString' release-manifest.json)"
          x64_short_version="$(jq -r '.sources.macos.x64.appcast.shortVersionString' release-manifest.json)"
          mac_arm64_zip="artifacts/codex-macos/Codex-darwin-arm64-${arm_short_version}.zip"
          mac_intel_zip="artifacts/codex-macos/Codex-darwin-x64-${x64_short_version}.zip"
          arm_zip_key="latest/mac/arm64/Codex-darwin-arm64-${arm_short_version}.zip"
          intel_zip_key="latest/mac/intel/Codex-darwin-x64-${x64_short_version}.zip"

          test -f "$mac_arm64_zip"
          test -f "$mac_intel_zip"
          test -f appcast.xml
          test -f appcast-x64.xml

          # Sparkle delta archives (.delta) advertised under <sparkle:deltas>.
          # Their basenames come straight from release-manifest.json (the same
          # source build-appcast.sh used), and they were downloaded verbatim into
          # artifacts/codex-macos/. arm64 deltas key under latest/mac/arm64/ and
          # x64 deltas under latest/mac/intel/, matching the mirror enclosure URLs.
          # Listed into files (one basename per line) to avoid relying on bash
          # array semantics, consistent with the other mirror scripts.
          jq -r '.sources.macos.arm64.appcast.deltas[]?.basename // empty' release-manifest.json > /tmp/arm-delta-basenames.txt
          jq -r '.sources.macos.x64.appcast.deltas[]?.basename // empty' release-manifest.json > /tmp/x64-delta-basenames.txt
          while IFS= read -r bn; do
            [[ -z "$bn" ]] && continue
            test -f "artifacts/codex-macos/$bn"
          done < <(cat /tmp/arm-delta-basenames.txt /tmp/x64-delta-basenames.txt)

          staging_prefix="staging/${{ steps.meta.outputs.tag }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup_staging() {
            bash scripts/clear-r2-prefix.sh "$R2_BUCKET_NAME" "$staging_prefix" || true
          }
          trap cleanup_staging EXIT

          upload_aliases() {
            local prefix="$1"
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/mac-arm64" "$mac_arm64" Codex-mac-arm64.dmg
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/mac-intel" "$mac_intel" Codex-mac-intel.dmg
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/win" "$win_msix" Codex-Windows-x64.msix
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/checksums" SHA256SUMS.txt SHA256SUMS.txt
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/manifest" release-manifest.json release-manifest.json
          }

          # appcast feeds are small and change every release, so keep their CDN
          # cache short; the versioned Sparkle archives are immutable.
          upload_appcast() {
            local key="$1"
            local file="$2"
            R2_CACHE_CONTROL="public, max-age=600" \
              bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$key" "$file" "$(basename "$file")"
          }

          upload_aliases "$staging_prefix"
          aws s3 cp "s3://$R2_BUCKET_NAME/$staging_prefix/manifest" /tmp/r2-staging-manifest.json \
            --endpoint-url "$R2_S3_ENDPOINT" \
            --region "${AWS_DEFAULT_REGION:-auto}" \
            --no-progress
          cmp release-manifest.json /tmp/r2-staging-manifest.json

          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-arm64 "$mac_arm64" Codex-mac-arm64.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-intel "$mac_intel" Codex-mac-intel.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/win "$win_msix" Codex-Windows-x64.msix
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/checksums SHA256SUMS.txt SHA256SUMS.txt
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/manifest release-manifest.json release-manifest.json

          # Sparkle archives first, then the appcasts that reference them, so the
          # feed never advertises an enclosure that is not yet downloadable. The
          # full .zip and every .delta go up before the appcasts are published.
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$arm_zip_key" "$mac_arm64_zip" "$(basename "$mac_arm64_zip")"
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$intel_zip_key" "$mac_intel_zip" "$(basename "$mac_intel_zip")"
          while IFS= read -r bn; do
            [[ -z "$bn" ]] && continue
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "latest/mac/arm64/$bn" "artifacts/codex-macos/$bn" "$bn"
          done < /tmp/arm-delta-basenames.txt
          while IFS= read -r bn; do
            [[ -z "$bn" ]] && continue
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "latest/mac/intel/$bn" "artifacts/codex-macos/$bn" "$bn"
          done < /tmp/x64-delta-basenames.txt
          upload_appcast latest/appcast.xml appcast.xml
          upload_appcast latest/appcast-x64.xml appcast-x64.xml

          curl -fsSL \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 120 \
            "$R2_PUBLIC_BASE_URL/latest/manifest?run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -o /tmp/r2-public-manifest.json
          cmp release-manifest.json /tmp/r2-public-manifest.json

          # Read the appcasts back through the public CDN and diff against what we
          # generated. If R2 ever silently stops accepting these objects, this
          # fails the workflow instead of leaving a stale (orphaned) feed behind.
          curl -fsSL \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 120 \
            "$R2_PUBLIC_BASE_URL/latest/appcast.xml?run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -o /tmp/r2-public-appcast.xml
          cmp appcast.xml /tmp/r2-public-appcast.xml
          curl -fsSL \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 120 \
            "$R2_PUBLIC_BASE_URL/latest/appcast-x64.xml?run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -o /tmp/r2-public-appcast-x64.xml
          cmp appcast-x64.xml /tmp/r2-public-appcast-x64.xml

          # Keep latest/mac bounded without racing cached appcasts: only stale
          # archives outside the grace window are removed. Pass the freshly built
          # appcasts so the keep list protects the current full .zip AND every
          # live .delta they reference (prune-mac-source.sh parses the feeds).
          bash scripts/prune-mac-source.sh \
            "$R2_BUCKET_NAME" \
            latest/mac \
            "$mac_arm64_zip" \
            "$mac_intel_zip" \
            appcast.xml \
            appcast-x64.xml

      - name: Sync GitHub Release assets to secondary S3 mirror
        env:
          SECONDARY_S3_ENDPOINT: ${{ secrets.SECONDARY_S3_ENDPOINT }}
          SECONDARY_S3_BUCKET: ${{ secrets.SECONDARY_S3_BUCKET }}
          SECONDARY_S3_REGION: ${{ secrets.SECONDARY_S3_REGION }}
          SECONDARY_S3_PREFIX: latest
          SECONDARY_S3_ACCESS_KEY_ID: ${{ secrets.SECONDARY_S3_ACCESS_KEY_ID }}
          SECONDARY_S3_SECRET_ACCESS_KEY: ${{ secrets.SECONDARY_S3_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          SECONDARY_S3_REGION="${SECONDARY_S3_REGION:-auto}"
          if [[ -z "${SECONDARY_S3_ENDPOINT:-}" && -z "${SECONDARY_S3_BUCKET:-}" && -z "${SECONDARY_S3_ACCESS_KEY_ID:-}" && -z "${SECONDARY_S3_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Secondary S3 mirror is not configured; skipping."
            exit 0
          fi
          if [[ -z "${SECONDARY_S3_ENDPOINT:-}" || -z "${SECONDARY_S3_BUCKET:-}" || -z "${SECONDARY_S3_ACCESS_KEY_ID:-}" || -z "${SECONDARY_S3_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Secondary S3 mirror is partially configured; set endpoint, bucket, access key, and secret key." >&2
            exit 1
          fi

          mac_arm64="artifacts/codex-macos/Codex-mac-arm64.dmg"
          mac_intel="artifacts/codex-macos/Codex-mac-x64.dmg"
          win_msix="$(find artifacts/codex-windows -maxdepth 1 -type f \( -name '*.Msix' -o -name '*.msix' \) | sort | head -n 1)"

          arm_short_version="$(jq -r '.sources.macos.arm64.appcast.shortVersionString' release-manifest.json)"
          x64_short_version="$(jq -r '.sources.macos.x64.appcast.shortVersionString' release-manifest.json)"
          mac_arm64_zip="artifacts/codex-macos/Codex-darwin-arm64-${arm_short_version}.zip"
          mac_intel_zip="artifacts/codex-macos/Codex-darwin-x64-${x64_short_version}.zip"

          test -f "$mac_arm64"
          test -f "$mac_intel"
          test -f "$win_msix"
          test -f "$mac_arm64_zip"
          test -f "$mac_intel_zip"
          test -f appcast.xml
          test -f appcast-x64.xml

          bash scripts/sync-secondary-s3.sh \
            "$mac_arm64" \
            "$mac_intel" \
            "$win_msix" \
            SHA256SUMS.txt \
            release-manifest.json \
            "$mac_arm64_zip" \
            "$mac_intel_zip" \
            appcast.xml \
            appcast-x64.xml

          tmp_config="$(mktemp)"
          cleanup() {
            rm -f "$tmp_config"
          }
          trap cleanup EXIT
          cat > "$tmp_config" <<EOF
          [default]
          region = $SECONDARY_S3_REGION
          s3 =
              addressing_style = path
          EOF

          secondary_readback() {
            local key="$1"
            local dest="$2"
            AWS_ACCESS_KEY_ID="$SECONDARY_S3_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$SECONDARY_S3_SECRET_ACCESS_KEY" \
            AWS_DEFAULT_REGION="$SECONDARY_S3_REGION" \
            AWS_CONFIG_FILE="$tmp_config" \
            aws s3 cp "s3://$SECONDARY_S3_BUCKET/$key" "$dest" \
              --endpoint-url "$SECONDARY_S3_ENDPOINT" \
              --region "$SECONDARY_S3_REGION" \
              --no-progress
          }

          secondary_readback latest/manifest /tmp/secondary-s3-manifest.json
          cmp release-manifest.json /tmp/secondary-s3-manifest.json

          # Read the appcasts back from the secondary bucket and diff. Keeps the
          # secondary feed from silently drifting out of sync with each release.
          secondary_readback latest/appcast.xml /tmp/secondary-s3-appcast.xml
          cmp appcast.xml /tmp/secondary-s3-appcast.xml
          secondary_readback latest/appcast-x64.xml /tmp/secondary-s3-appcast-x64.xml
          cmp appcast-x64.xml /tmp/secondary-s3-appcast-x64.xml

      - name: Prune stale macOS Sparkle archives on secondary S3 mirror
        env:
          SECONDARY_S3_ENDPOINT: ${{ secrets.SECONDARY_S3_ENDPOINT }}
          SECONDARY_S3_BUCKET: ${{ secrets.SECONDARY_S3_BUCKET }}
          SECONDARY_S3_REGION: ${{ secrets.SECONDARY_S3_REGION }}
          SECONDARY_S3_ACCESS_KEY_ID: ${{ secrets.SECONDARY_S3_ACCESS_KEY_ID }}
          SECONDARY_S3_SECRET_ACCESS_KEY: ${{ secrets.SECONDARY_S3_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          # Symmetric to the R2 prune above: keep the secondary IHEP mirror's
          # latest/mac prefix bounded so old Sparkle archives do not accumulate
          # forever on its limited storage. Skip cleanly when the mirror is not
          # configured (same contract as the secondary sync step).
          if [[ -z "${SECONDARY_S3_ENDPOINT:-}" && -z "${SECONDARY_S3_BUCKET:-}" && -z "${SECONDARY_S3_ACCESS_KEY_ID:-}" && -z "${SECONDARY_S3_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Secondary S3 mirror is not configured; skipping prune."
            exit 0
          fi
          if [[ -z "${SECONDARY_S3_ENDPOINT:-}" || -z "${SECONDARY_S3_BUCKET:-}" || -z "${SECONDARY_S3_ACCESS_KEY_ID:-}" || -z "${SECONDARY_S3_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Secondary S3 mirror is partially configured; set endpoint, bucket, access key, and secret key." >&2
            exit 1
          fi

          # Recompute the current Sparkle archive basenames from the manifest so
          # the keep list matches the enclosure URLs build-appcast.sh emitted and
          # the secondary sync uploaded (latest/mac/{arm64,intel}/...).
          arm_short_version="$(jq -r '.sources.macos.arm64.appcast.shortVersionString' release-manifest.json)"
          x64_short_version="$(jq -r '.sources.macos.x64.appcast.shortVersionString' release-manifest.json)"
          mac_arm64_zip="artifacts/codex-macos/Codex-darwin-arm64-${arm_short_version}.zip"
          mac_intel_zip="artifacts/codex-macos/Codex-darwin-x64-${x64_short_version}.zip"
          test -f "$mac_arm64_zip"
          test -f "$mac_intel_zip"

          # The secondary mirror (IHEP S3) needs path-style addressing, the same
          # way the secondary sync/readback do. Point the AWS CLI at a config that
          # forces it so list/delete resolve against the custom endpoint host.
          secondary_region="${SECONDARY_S3_REGION:-auto}"
          tmp_config="$(mktemp)"
          cleanup() {
            rm -f "$tmp_config"
          }
          trap cleanup EXIT
          cat > "$tmp_config" <<EOF
          [default]
          region = $secondary_region
          s3 =
              addressing_style = path
          EOF

          # prune-mac-source.sh speaks the R2/AWS env-var vocabulary, so map the
          # secondary mirror's credentials and endpoint onto it. The keep list is
          # the current arm64/x64 zip basenames PLUS the freshly built appcasts, so
          # the script protects the current full .zip AND every live <sparkle:deltas>
          # .delta they reference -- identical to the R2 prune above. Without the
          # appcasts, live deltas on this limited IHEP mirror would be deleted after
          # the grace window while R2 kept them. The prefix matches the secondary
          # layout (SECONDARY_S3_PREFIX defaults to "latest").
          secondary_prefix="${SECONDARY_S3_PREFIX:-latest}"
          R2_S3_ENDPOINT="$SECONDARY_S3_ENDPOINT" \
          AWS_ACCESS_KEY_ID="$SECONDARY_S3_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$SECONDARY_S3_SECRET_ACCESS_KEY" \
          AWS_DEFAULT_REGION="$secondary_region" \
          AWS_EC2_METADATA_DISABLED=true \
          AWS_CONFIG_FILE="$tmp_config" \
            bash scripts/prune-mac-source.sh \
              "$SECONDARY_S3_BUCKET" \
              "$secondary_prefix/mac" \
              "$mac_arm64_zip" \
              "$mac_intel_zip" \
              appcast.xml \
              appcast-x64.xml

  no_changes:
    name: No new version
    runs-on: ubuntu-latest
    needs: probe
    if: needs.probe.outputs.should_release != 'true'
    steps:
      - name: Report current state
        run: |
          echo "No new Codex app version detected."
          echo "${{ needs.probe.outputs.skip_reason }}"
          echo "${{ needs.probe.outputs.version_summary }}"
