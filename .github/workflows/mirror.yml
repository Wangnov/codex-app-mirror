name: Mirror Codex App Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag. Defaults to codex-app-YYYYMMDD-HHMMSS.
        required: false
        type: string
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  macos:
    name: Download macOS installers
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS DMGs
        run: bash scripts/download-macos.sh dist/macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-macos
          path: dist/macos/*
          if-no-files-found: error

  windows:
    name: Download Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows MSIX
        shell: pwsh
        run: ./scripts/download-windows.ps1 -OutDir dist/windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="codex-app-$(date -u +'%Y%m%d-%H%M%S')"
          fi
          {
            echo "tag=$tag"
            echo "title=Codex App Mirror ${tag#codex-app-}"
          } >> "$GITHUB_OUTPUT"

          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

          {
            echo "Official Codex desktop app installer mirror."
            echo
            echo "Sources:"
            echo "- Windows: Microsoft Store ProductId 9PLM9XGG6VKS via DisplayCatalog/FE3 metadata"
            echo "- macOS arm64: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg"
            echo "- macOS x64: https://persistent.oaistatic.com/codex-app-prod/Codex-latest-x64.dmg"
            echo
            echo "Checksums are attached in SHA256SUMS.txt."
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            artifacts/codex-macos/* \
            artifacts/codex-windows/* \
            SHA256SUMS.txt
